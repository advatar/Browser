version: 2

product:
  status: swift_only
  canonical_docs:
    - docs/ARCHITECTURE.md
    - docs/README.md
  current_app:
    path: swift/dBrowser
    project: swift/dBrowser/dBrowser.xcodeproj
    scheme: dBrowser

components:
  swift_app:
    description: Native SwiftUI browser and agent app.
    path: swift/dBrowser/dBrowser
    owns:
      - browser_chrome
      - tabs
      - address_resolution
      - wkwebview_rendering
      - approvals
      - runtime_status

  browser_runtime_bridge:
    description: Swift boundary for decentralized resolution, Copilot, AFMarket services, wallet policy, downloads, and future package integrations.
    path: swift/dBrowser/dBrowser/RuntimeBridge.swift
    target_packages:
      - BrowserAutomationKit
      - AgentRuntimeKit
      - LLMConversationKit
      - AFMarketKit
      - OpenMindMemoryKit
      - ChainTrustKit
      - WalletPolicyKit
      - DecentralizedContentKit

  llm_conversation:
    description: Desktop-style conversation surface with provider-neutral context, streamed runs, and mid-conversation model switching.
    status: planned
    issue: 72
    target_package: LLMConversationKit
    related_packages:
      - BundledLLMKit
      - LLMGatewayKit
      - AgentRuntimeKit

  afmarket:
    description: External AFMarket contracts for runner-pack discovery, routing, node dispatch, attestation, proof, and settlement.
    path: ../AFMarket
    issue: 69
    target_package: AFMarketKit

  brian_openmind:
    description: External BrIAn/OpenMind personal memory store accessed through MCP/OMPS only.
    path: ../OpenMind/BrIAn
    issue: 70
    target_package: OpenMindMemoryKit

  chain_trust:
    description: Shared trust-state registry and chain-specific Swift light-client packages.
    status: planned
    issues:
      - 59
      - 60
      - 61
      - 62
      - 63
      - 64
      - 65
      - 66
      - 67
      - 68

reference_only:
  rust_tauri_runtime:
    description: Historical implementation reference for behavior, contracts, fixtures, and tests. Not current product runtime.
    paths:
      - crates
      - orbit-shell-ui
      - services
