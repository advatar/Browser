version: 2

commands:
  - name: markdown_hygiene
    description: Check the current documentation set for whitespace and non-ASCII drift.
    cmd: git diff --check -- README.md STATUS.md STRAWBERRY_SWIFT.md docs/ARCHITECTURE.md docs/README.md docs/ai/system_map.yaml docs/ai/dev_commands.yaml && LC_ALL=C grep -n '[^ -~]' README.md STATUS.md STRAWBERRY_SWIFT.md docs/ARCHITECTURE.md docs/README.md docs/ai/system_map.yaml docs/ai/dev_commands.yaml || true

  - name: build_swift_app
    description: Build the current Swift dBrowser app.
    cmd: xcodebuild build -project swift/dBrowser/dBrowser.xcodeproj -scheme dBrowser -destination 'platform=macOS'

  - name: test_swift_unit
    description: Run the focused Swift unit-test lane used for architecture and runtime model changes.
    cmd: xcodebuild test -project swift/dBrowser/dBrowser.xcodeproj -scheme dBrowser -destination 'platform=macOS,arch=arm64' -only-testing:dBrowserTests

  - name: inspect_rust_reference
    description: Read legacy Rust/Tauri behavior only when reimplementing a capability as Swift packages.
    cmd: rg -n 'TODO|Copilot|agent|wallet|ipfs|light|AFM|LLM' crates orbit-shell-ui services
    current_product_gate: false
